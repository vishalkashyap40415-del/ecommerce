{% extends "main.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center mt-5">

        <div class="col-sm-6">

            <div style="border:1px solid #ddd; padding:30px; border-radius:10px; background:#f9f9f9; box-shadow:0px 0px 10px rgba(0,0,0,0.1);">

                <h2 class="text-center text-primary mb-4">C-Panel</h2>

                <form action="{% url 'login' %}" method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary">Login</button>
                    </div>

                    <div class="text-center mt-3">
                        <a href="{% url 'newuser' %}">Create an Account?</a>
                    </div>

                </form>

                <div class="text-center text-danger mt-3">
                    {% for message in messages %}
                        <h6>{{ message }}</h6>
                    {% endfor %}
                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
