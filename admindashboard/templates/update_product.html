{% extends "admin_main.html" %}
{% block title %}Update Product{% endblock %}

{% block content %}
<div class="row g-4">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-3">Update Product</h1>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="pname" class="form-label">Product Name</label>
                        <input type="text" id="pname" name="pname" class="form-control" required value="{{ product.pname }}">
                    </div>
                    <div class="mb-3">
                        <label for="pprice" class="form-label">Price</label>
                        <input type="text" id="pprice" name="pprice" class="form-control" required value="{{ product.pprice }}">
                    </div>
                    <div class="mb-3">
                        <label for="ptype" class="form-label">Type</label>
                        <input type="text" id="ptype" name="ptype" class="form-control" required value="{{ product.ptype }}">
                    </div>
                    <div class="mb-3">
                        <label for="pdescription" class="form-label">Description</label>
                        <textarea id="pdescription" name="pdescription" rows="4" class="form-control" required>{{ product.pdescription }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Current Photo</label>
                        <div>
                            <img src="{{ product.pphoto.url }}" width="120" height="120" class="rounded" alt="Current product photo">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="pphoto" class="form-label">Change Photo (optional)</label>
                        <input type="file" id="pphoto" name="pphoto" accept="image/*" class="form-control">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{% url 'manage_product' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>

                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show mt-4" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
